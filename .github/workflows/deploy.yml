name: Deploy to Namecheap (Jagdrevier Prad)

# Triggert bei Push auf main – und manuell aus der Actions-Oberfläche.
# Die FTP-Zugangsdaten kommen aus GitHub-Secrets und sind NICHT in dieser Datei.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate api/config.php from secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          APP_PASS_HASH: ${{ secrets.APP_PASS_HASH }}
        run: |
          mkdir -p api
          # PHP ist auf ubuntu-latest Runnern vorinstalliert.
          # var_export sorgt für korrektes Escaping aller Werte.
          php -r '
            $cfg = [
              "db_host"       => getenv("DB_HOST") ?: "localhost",
              "db_name"       => getenv("DB_NAME"),
              "db_user"       => getenv("DB_USER"),
              "db_pass"       => getenv("DB_PASS"),
              "app_pass_hash" => getenv("APP_PASS_HASH"),
            ];
            $content = "<?php\n"
                     . "// AUTO-GENERATED – NICHT PER HAND EDITIEREN\n"
                     . "// Wird bei jedem Deploy aus GitHub-Secrets neu erzeugt.\n"
                     . "return " . var_export($cfg, true) . ";\n";
            file_put_contents("api/config.php", $content);
            echo "Generated api/config.php (" . filesize("api/config.php") . " bytes)\n";
          '

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          # Namecheap FTP-User mit Domain-Scope landen direkt im
          # Dokumenten-Root der Subdomain, daher "/".
          # Falls nicht, in GitHub-Secret FTP_DIR einen Pfad setzen.
          server-dir: ${{ secrets.FTP_DIR || '/' }}
          # Was NICHT hochgeladen werden soll:
          # (api/config.php NICHT ausschließen - die wird ja gerade generiert!)
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            *.sql
            *.md
            LICENSE
